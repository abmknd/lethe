name: Supabase keepalive

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        env:
          API_HEALTH_URL: ${{ vars.API_HEALTH_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.ANON_KEY }}
        run: |
          if [ -z "$API_HEALTH_URL" ]; then
            echo "API_HEALTH_URL repository variable is not set" >&2
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "SUPABASE_ANON_KEY secret is not set" >&2
            exit 1
          fi
          curl --fail --silent --show-error --max-time 30 \
            "apikey: $SUPABASE_ANON_KEY" \
            "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$API_HEALTH_URL"
