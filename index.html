<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relethe | Signal-based Networking</title>
    <meta name="description" content="Relethe matches you with up to five people a week based on who you actually are, not who you perform to be. Join the founding cohort." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://relethe.com/" />
    <meta property="og:title" content="Relethe | Signal-based Networking" />
    <meta property="og:description" content="Relethe matches you with up to five people a week based on who you actually are, not who you perform to be. Join the founding cohort." />
    <meta property="og:image" content="https://relethe.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Relethe | Signal-based Networking" />
    <meta name="twitter:description" content="Relethe matches you with up to five people a week based on who you actually are, not who you perform to be. Join the founding cohort." />
    <meta name="twitter:image" content="https://relethe.com/og-image.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Relethe",
      "url": "https://relethe.com",
      "description": "A private network that matches you with the right people based on your goals, not your follower count.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://relethe.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <script>
  (function(l) {
    if (l.search[1] === '/') {
      var decoded = l.search.slice(1).replace(/~and~/g, '&');
      window.history.replaceState(null, null,
        l.pathname.slice(0, -1) + decoded + l.hash
      );
    }
  }(window.location))
</script>
  </head>
  <body>
    <div id="root"></div>
   <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
